<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeRoasters</title>


    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/necolas.github.io_normalize.css_8.0.1_normalize.css">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <div class="site-top">
        <!-- SITE HEADER -->
        <header class="site-header">
            <div class="container">
                <div class="site-header-content">
                    <a class="site-logo" href="#">
                        <img class="site-logo-img" src="img/logo.svg" alt="Site logo" width="235" height="24">
                    </a>

                    <nav class="sitenav">
                        <ul class="sitenav-list">
                            <li class="nav-item">
                                <a class="nav-link" href="#">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">About us</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Create your plan</a>
                            </li>
                        </ul>
                    </nav>
                </div>

                <div class="hero">
                    <h1 class="hero-heading">Good coffee is made simply.</h1>
                    <p class="hero-text">
                        Start your mornings with the world’s best coffees. Try our expertly curated artisan coffees from our best roasters delivered directly to your door, at your schedule.
                    </p>
                    <button class="button" type="submit">Create your plan</button>
                </div>
            </div>
        </header>
    </div>


    <!-- COLLECTION -->
    <section class="collection">
        <div class="container">
            <h2 class="collection-heading">our collection</h2>
            <div class="collection-content">
                <img class="collection-content-img" src="img/kopi4.jpg" alt="" width="450" height="375">
            </div>
        </div>
    </section>



</body>
</html>
